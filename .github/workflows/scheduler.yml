name: WhatsApp Bot

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:        

jobs:
  send-message:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependências
        run: npm install

      - name: Restaurar sessão
        run: |
            mkdir -p auth_info
    node -e "
      const fs = require('fs');
      const zlib = require('zlib');
      const compressed = Buffer.from('${{ secrets.WHATSAPP_AUTH }}', 'base64');
      const data = JSON.parse(zlib.gunzipSync(compressed).toString());
      for (const [filename, content] of Object.entries(data)) {
          fs.writeFileSync('auth_info/' + filename, JSON.stringify(content));
        }
        console.log('✅ Sessão restaurada!');
        "

      - name: Enviar mensagem
        run: node send.js
        timeout-minutes: 2