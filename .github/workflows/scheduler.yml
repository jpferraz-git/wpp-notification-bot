name: WhatsApp Bot

on:
  schedule:
    - cron: '*/15 * * * *' # toda segunda às 7h (Brasília = UTC-3, então 10h UTC)
  workflow_dispatch:        # permite rodar manualmente pra testar

jobs:
  send-message:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependências
        run: npm install

      - name: Restaurar sessão
        run: |
          mkdir -p auth_info
          echo '${{ secrets.WHATSAPP_AUTH }}' | node -e "
            const fs = require('fs');
            let data = '';
            process.stdin.on('data', d => data += d);
            process.stdin.on('end', () => {
              const parsed = JSON.parse(data);
              for (const [filename, content] of Object.entries(parsed)) {
                fs.writeFileSync('auth_info/' + filename, JSON.stringify(content));
              }
              console.log('✅ Sessão restaurada!');
            });
          "

      - name: Enviar mensagem
        run: node send.js
        timeout-minutes: 2